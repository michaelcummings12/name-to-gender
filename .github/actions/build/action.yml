name: "Setup and Build"
description: "Sets up Node, installs dependencies, runs tests and builds the package"

runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: "latest"
        registry-url: "https://registry.npmjs.org"
        cache: "npm"
    - name: Install dependencies
      shell: bash
      run: npm ci
    - name: Run tests
      shell: bash
      run: npm test
    - name: Build package
      shell: bash
      run: npm run build
